name: Manually build package

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      line:
        description: "Tracked line to build (key in tracked-lines.yaml, e.g. 9.1)"
        default: "9.1"
        required: true
      flavor:
        description: "Debian/Ubuntu flavor (e.g. debian:trixie, ubuntu:noble)"
        default: "debian:trixie"
        required: true
      arch:
        type: choice
        description: "Architecture"
        options:
          - "amd64"
          - "arm64"
        default: "amd64"
        required: true

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: build-debian

      - name: Validate flavor and resolve line -> tag
        id: resolve
        run: |
          set -eu
          flavor="${{ inputs.flavor }}"
          if ! grep -qx "${flavor}" build-debian/.github/supported-releases.txt; then
            echo "Unsupported flavor: ${flavor}"
            echo "Supported flavors:"
            cat build-debian/.github/supported-releases.txt
            exit 1
          fi

          python3 - "${{ inputs.line }}" <<'PY' >> "$GITHUB_OUTPUT"
          import sys, yaml
          line = sys.argv[1]
          data = yaml.safe_load(open("build-debian/tracked-lines.yaml"))
          cfg = data["lines"].get(line)
          if cfg is None:
              sys.exit(f"Unknown line '{line}' - not present in tracked-lines.yaml")
          print(f"tag={cfg['tag']}")
          print(f"debian_revision={cfg.get('debian_revision', 1)}")
          PY

      - uses: actions/checkout@v7
        with:
          repository: valkey-io/valkey
          ref: refs/tags/${{ steps.resolve.outputs.tag }}
          submodules: "recursive"

      - name: Extract OS Flavor and Version
        run: |
          os_version="${{ inputs.flavor }}"
          echo "flavor=${os_version%%:*}" >> "$GITHUB_ENV"
          echo "debian_release=${os_version##*:}" >> "$GITHUB_ENV"

      - uses: jtdor/build-deb-action@v1.9.1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        with:
          docker-image: "${{ inputs.flavor }}"
          host-arch: "${{ inputs.arch }}"
          setup-hook: |
            export DEBIAN_FRONTEND=noninteractive
            os_version="${{ inputs.flavor }}"
            flavor=${os_version%%:*}
            arch="${{ inputs.arch }}"
            if [ "$flavor" = "ubuntu" ] && [ "$arch" = "arm64" ]; then
              if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
                cp /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list.d/ubuntu-arm.sources
                sed -i 's,[a-z]*.ubuntu.com,ports.ubuntu.com,' /etc/apt/sources.list.d/ubuntu-arm.sources
                sed -i 's,/ubuntu/$,/ubuntu-ports/,' /etc/apt/sources.list.d/ubuntu-arm.sources
                sed -i 's/^Components:/Architectures: arm64\nComponents:/' /etc/apt/sources.list.d/ubuntu-arm.sources
                sed -i 's/^Components:/Architectures: amd64\nComponents:/' /etc/apt/sources.list.d/ubuntu.sources
              else
                cp /etc/apt/sources.list /etc/apt/sources.list.d/ubuntu-arm.list
                sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
                sed -i 's,[a-z]*.ubuntu.com,ports.ubuntu.com,' /etc/apt/sources.list.d/ubuntu-arm.list
                sed -i 's,/ubuntu/ ,/ubuntu-ports/ ,' /etc/apt/sources.list.d/ubuntu-arm.list
                sed -i 's/^deb /deb [arch=arm64] /' /etc/apt/sources.list.d/ubuntu-arm.list
                cat /etc/apt/sources.list  /etc/apt/sources.list.d/ubuntu-arm.list
              fi
            fi
            if [ "$arch" = "arm64" ]; then
              dpkg --add-architecture arm64
              apt-get update
              apt-get install -y libatomic1:arm64
            fi

            /github/workspace/build-debian/bin/materialize-debian.sh "${{ inputs.line }}" /github/workspace
          extra-build-deps: "devscripts git dpkg-cross"
          # -b: see the comment on the equivalent step in build.yml - the
          # ~codename suffix always sorts below the bare base version.
          before-build-hook: "DEBEMAIL='GitHub Actions <github-actions@users.noreply.github.com>' dch -v ${{ steps.resolve.outputs.tag }}-${{ steps.resolve.outputs.debian_revision }}~${{ env.debian_release }}1 -b 'GitHub manual build for ${{ inputs.flavor }}'"
          buildpackage-opts: --build=binary --no-sign -d

      - name: Upload deb files
        uses: actions/upload-artifact@v7
        with:
          name: "packages-${{ inputs.line }}-${{ env.debian_release }}-${{ inputs.arch }}"
          path: ./debian/artifacts/*
